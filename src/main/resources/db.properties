# MySQL 数据库连接配置
# 你在 E:\SchoolLibrary 本地运行时，重点修改 username/password 即可。
jdbc.driver=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3306/school_library?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
jdbc.username=root
jdbc.password=root

# Druid 连接池参数
jdbc.initialSize=3
jdbc.maxActive=20
jdbc.minIdle=3
jdbc.maxWait=60000
